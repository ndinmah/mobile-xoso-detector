# JDBC URL: thêm sslmode=require vì Neon bắt buộc SSL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/xoso}

# Username và password lấy từ Neon Dashboard
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Driver PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Tối ưu hóa Batch Insert/Update cho Hibernate
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Spring Scheduling
spring.task.scheduling.enabled=true

# External API Configuration
google.vision.api.url=https://vision.googleapis.com/v1/images:annotate
google.vision.api.key=${GOOGLE_VISION_API_KEY}

gemini.api.url=https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash-lite:generateContent
gemini.api.key=${GEMINI_API_KEY}

# Crawl URLs cho 3 miền
crawl.url.mien-nam=https://www.kqxs.vn/mien-nam
crawl.url.mien-trung=https://www.kqxs.vn/mien-trung
crawl.url.mien-bac=https://www.kqxs.vn/mien-bac

# Crawl Polling Strategy
# Giai đoạn 1 - Live: interval (giây) khi đang trong khung giờ quay
crawl.live.interval-seconds=15
# Giai đoạn 2 - Verify: 1 lần sau khi kết thúc quay (phút sau khi hết Live window)
crawl.verify.delay-minutes=30
# Timeout: Nếu đến giờ này vẫn chưa có Giải ĐB → cảnh báo
# XSMN: Live 16:15-16:35 | Timeout 16:45 | Verify 17:05
# XSMT: Live 17:15-17:35 | Timeout 17:45 | Verify 18:05
# XSMB: Live 18:15-18:40 | Timeout 18:50 | Verify 19:10
